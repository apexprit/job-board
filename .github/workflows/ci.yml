name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
      - run: cd shared && npm run build
      - run: cd server && npx tsc --noEmit
      - run: cd client && npx tsc --noEmit

  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobboard_test
          POSTGRES_USER: jobboard
          POSTGRES_PASSWORD: jobboard_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd shared && npm run build
      - run: cd server && npx prisma generate
      - run: cd server && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://jobboard:jobboard_secret@localhost:5432/jobboard_test
      - run: cd server && npm test
        env:
          DATABASE_URL: postgresql://jobboard:jobboard_secret@localhost:5432/jobboard_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd shared && npm run build
      - run: cd client && npm run test -- --run
      - run: cd client && npm run build

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-server, test-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -f server/Dockerfile -t jobboard-server:latest .
      - name: Build client image
        run: docker build -f client/Dockerfile -t jobboard-client:latest .
