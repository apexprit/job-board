version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobboard-dev-postgres
    environment:
      POSTGRES_DB: jobboard_dev
      POSTGRES_USER: jobboard
      POSTGRES_PASSWORD: jobboard_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobboard-dev-redis
    ports:
      - "6379:6379"

  # Adminer for database management
  adminer:
    image: adminer
    container_name: jobboard-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
